version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu
    overwrite: yes
permissions:
  - object: /home/ubuntu
    pattern: "**"
    owner: ubuntu
    group: ubuntu
hooks: 
  ApplicationStop:
    - location: scripts/stop_process.sh
      timeout: 120
      runas: ubuntu
  ApplicationStart:
    - location: scripts/start_process.sh
      timeout: 300
      runas: ubuntu
    
